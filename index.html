<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>环评记忆卡</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #dde5ec;
      --line-strong: #c8d5df;
      --teal: #008a82;
      --teal-dark: #05736d;
      --teal-soft: #e7f7f5;
      --blue-soft: #e7f1ff;
      --blue: #2a6fb6;
      --orange: #f59e0b;
      --red: #ef4e45;
      --red-soft: #fff0ee;
      --green: #10a37f;
      --shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; border: 0; background: none; color: inherit; }

    .app {
      display: grid;
      grid-template-columns: 324px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: auto;
      padding: 20px 16px 24px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 54px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #006d79, #16b69e);
      color: white;
      box-shadow: 0 12px 22px rgba(0, 138, 130, 0.22);
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .side-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #344054;
      font-size: 15px;
      font-weight: 800;
    }

    .manage {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #475467;
      font-weight: 700;
      font-size: 13px;
    }

    .chapters {
      display: grid;
      gap: 7px;
    }

    .chapter {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 43px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      text-align: left;
      font-weight: 700;
    }

    .chapter.active {
      border-color: #61bdb5;
      background: var(--teal-soft);
      color: var(--teal-dark);
    }

    .chapter span:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #edf2f7;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }

    .chapter.active .badge {
      background: var(--teal);
      color: white;
    }

    .subchapters {
      margin: -2px 0 8px 30px;
      padding-left: 18px;
      border-left: 1px solid var(--line);
      color: #475467;
      font-size: 13px;
    }

    .subchapters div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
    }

    .overview {
      margin-top: auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .overview h3 {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #344054;
      font-size: 15px;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
    }

    .overview-grid b {
      display: block;
      margin-top: 4px;
      font-size: 20px;
    }

    .overview-grid span {
      color: var(--muted);
      font-size: 12px;
    }

    .progress {
      height: 8px;
      margin: 16px 0 10px;
      border-radius: 999px;
      background: #e9eef2;
      overflow: hidden;
    }

    .progress i {
      display: block;
      height: 100%;
      width: 24%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), #19b394);
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto auto auto minmax(220px, 340px) 1fr auto;
      align-items: center;
      gap: 16px;
      min-height: 88px;
      padding: 18px 26px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 9px 16px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel);
      color: #1d2939;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn:hover { border-color: #99aebd; box-shadow: 0 8px 20px rgba(16, 24, 40, 0.08); }
    .btn.primary { border-color: var(--teal); background: linear-gradient(135deg, #009c92, #007c76); color: white; }
    .btn.danger { border-color: #ffc0bd; background: var(--red-soft); color: #bf2f29; }
    .btn.ghost { min-width: 42px; padding: 9px; border-color: transparent; background: transparent; }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      min-height: 42px;
      padding: 10px 56px 10px 40px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
      background: white;
    }

    .search svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .kbd {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      padding: 3px 8px;
      border-radius: 7px;
      background: #f2f4f7;
      color: #475467;
      font-size: 12px;
      font-weight: 800;
    }

    .user {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--teal);
      color: white;
      font-weight: 900;
    }

    .content {
      padding: 22px 26px 0;
    }

    .tabs {
      display: flex;
      gap: 38px;
      min-height: 44px;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-bottom: 3px solid transparent;
      color: #475467;
      font-weight: 900;
    }

    .tab.active {
      color: var(--teal);
      border-color: var(--teal);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 292px;
      gap: 28px;
      padding-top: 26px;
      align-items: start;
    }

    .filters {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .selects, .view-toggle {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    select {
      min-height: 40px;
      padding: 8px 38px 8px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: #344054;
      font-weight: 700;
      outline: none;
    }

    .seg {
      display: inline-flex;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
    }

    .seg button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 6px;
      color: #475467;
      font-size: 13px;
      font-weight: 800;
    }

    .seg button.active {
      background: var(--teal-soft);
      color: var(--teal-dark);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 16px;
    }

    .cards.list { grid-template-columns: 1fr; }

    .card {
      display: grid;
      gap: 18px;
      min-height: 310px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 6px 18px rgba(16, 24, 40, 0.04);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .star {
      color: var(--orange);
      font-size: 24px;
      line-height: 1;
    }

    .mnemonic {
      color: var(--teal-dark);
      font-size: 19px;
      line-height: 1.55;
      font-weight: 900;
      white-space: pre-wrap;
    }

    .meaning {
      color: #475467;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
    }

    .status.done { color: var(--green); }
    .status.learning { color: var(--orange); }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0 0;
      color: #475467;
    }

    .page-buttons {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .page {
      min-width: 38px;
      height: 38px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-weight: 800;
    }

    .page.active {
      border-color: #97d7d1;
      background: var(--teal-soft);
      color: var(--teal-dark);
    }

    .right-rail {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: var(--shadow);
    }

    .panel h3 {
      margin: 0 0 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #344054;
      font-size: 15px;
    }

    .plan {
      display: grid;
      grid-template-columns: 100px 1fr;
      align-items: center;
      gap: 14px;
    }

    .ring {
      width: 98px;
      height: 98px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--teal) 0 68%, #e8eef2 68% 100%);
      position: relative;
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: white;
    }

    .ring b {
      position: relative;
      z-index: 1;
      font-size: 26px;
    }

    .ring span {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .plan-stats {
      display: grid;
      gap: 8px;
      color: #475467;
      font-size: 13px;
    }

    .plan-stats strong {
      float: right;
      color: var(--teal);
      font-size: 16px;
    }

    .rail-btn {
      width: 100%;
      margin-top: 18px;
    }

    .wrong-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .wrong-tabs button {
      min-height: 36px;
      color: #667085;
      font-size: 13px;
      font-weight: 800;
      border-bottom: 2px solid transparent;
    }

    .wrong-tabs button.active {
      color: var(--teal);
      border-color: var(--teal);
    }

    .wrong-list {
      display: grid;
      gap: 12px;
    }

    .wrong-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      color: #344054;
      font-size: 13px;
      line-height: 1.55;
    }

    .wrong-item:last-child { border-bottom: 0; padding-bottom: 0; }

    .wrong-item time {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .wrong-label {
      align-self: start;
      padding: 4px 8px;
      border-radius: 999px;
      background: #fff1f3;
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 66px;
      margin-top: auto;
      border-top: 1px solid var(--line);
      color: #667085;
      background: rgba(255,255,255,0.8);
    }

    .empty {
      padding: 32px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: white;
      text-align: center;
      color: var(--muted);
    }

    dialog {
      width: min(640px, calc(100vw - 28px));
      border: 0;
      border-radius: var(--radius);
      padding: 0;
      box-shadow: 0 26px 70px rgba(16, 24, 40, 0.25);
    }

    dialog::backdrop { background: rgba(16, 24, 40, 0.45); }

    .modal-head, .modal-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .modal-actions { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
    .modal-head h3 { margin: 0; }

    .modal-body {
      display: grid;
      gap: 13px;
      padding: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-size: 13px;
      font-weight: 900;
      color: #344054;
    }

    .field input, .field textarea, .field select {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
    }

    .field textarea { min-height: 92px; resize: vertical; }
    .hidden { display: none !important; }
    .icon { width: 18px; height: 18px; flex: 0 0 auto; }

    @media (max-width: 1180px) {
      .workspace { grid-template-columns: 1fr; }
      .right-rail { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .topbar { grid-template-columns: repeat(3, auto) minmax(220px, 1fr) auto; }
      .user { display: none; }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .overview { margin-top: 0; }
      .topbar { grid-template-columns: 1fr 1fr; }
      .topbar .search { grid-column: 1 / -1; }
      .content { padding: 18px; }
      .cards { grid-template-columns: 1fr; }
      .right-rail { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .topbar { grid-template-columns: 1fr; padding: 14px; }
      .btn { width: 100%; }
      .tabs { gap: 18px; overflow-x: auto; }
      .filters { align-items: stretch; flex-direction: column; }
      .selects, .view-toggle { width: 100%; }
      select, .seg { flex: 1; }
      .card { min-height: 0; }
      .plan { grid-template-columns: 1fr; justify-items: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 4c-7 1-11 5-12 12"/><path d="M5 20c8-1 13-6 14-16"/><path d="M8 15c-2.5 0-4.2-.9-5-2.8C5.7 7 10.8 4.5 18.5 4"/></svg>
        </div>
        <div>
          <h1>环评记忆卡</h1>
          <p>环评考试记忆卡片 · 高效备考</p>
        </div>
      </div>

      <div class="side-heading">
        <span>章节列表</span>
        <button class="manage" id="addChapterBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          管理
        </button>
      </div>
      <div class="chapters" id="chapterList"></div>

      <div class="overview">
        <h3>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5"/><path d="M4 19h16"/><path d="m7 15 3-3 3 2 5-7"/></svg>
          学习概览
        </h3>
        <div class="overview-grid">
          <div><span>卡片总数</span><b id="totalCards">0</b></div>
          <div><span>已掌握</span><b style="color:var(--green)" id="doneCards">0</b></div>
          <div><span>错题数</span><b style="color:var(--red)" id="wrongCards">0</b></div>
        </div>
        <div class="progress"><i id="progressBar"></i></div>
        <div style="display:flex;justify-content:space-between;color:var(--muted);font-size:13px">
          <span id="progressText">掌握进度：0%</span>
          <button style="color:var(--teal);font-weight:800">查看统计 →</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn primary" id="topAddChapter">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          添加章节
        </button>
        <button class="btn" id="addCardBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          添加卡片
        </button>
        <button class="btn" id="practiceBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7h8"/><path d="M8 12h5"/><path d="M7 21h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z"/></svg>
          抽背练习
        </button>
        <div class="search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" placeholder="搜索卡片内容">
          <span class="kbd">Ctrl K</span>
        </div>
        <span></span>
        <div class="user">
          <button class="btn ghost" title="主题">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
          <button class="btn ghost" title="通知">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </button>
          <div class="avatar">学</div>
        </div>
      </header>

      <section class="content">
        <nav class="tabs">
          <button class="tab active" data-mode="cards">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16v14H4z"/><path d="M8 9h8M8 13h5"/></svg>
            口诀卡片
          </button>
          <button class="tab" data-mode="practice">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5V5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2"/><path d="M8 7h7"/></svg>
            抽背练习
          </button>
          <button class="tab" data-mode="wrong">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15h6"/></svg>
            错题本
          </button>
        </nav>

        <div class="workspace">
          <section>
            <div class="filters">
              <div class="selects">
                <select id="tagFilter"><option>全部标签</option><option>评价等级</option><option>地下水</option><option>大气环境</option></select>
                <select id="statusFilter"><option>全部状态</option><option>已掌握</option><option>学习中</option><option>错题</option></select>
                <select><option>最新创建</option><option>按章节排序</option><option>错题优先</option></select>
              </div>
              <div class="view-toggle">
                <div class="seg">
                  <button class="active" id="cardViewBtn">卡片视图</button>
                  <button id="listViewBtn">列表视图</button>
                </div>
              </div>
            </div>
            <div class="cards" id="cardGrid"></div>
            <div class="pager">
              <div class="page-buttons">
                <button class="page">‹</button>
                <button class="page active">1</button>
                <button class="page">2</button>
                <button class="page">3</button>
                <span>…</span>
                <button class="page">9</button>
                <button class="page">›</button>
              </div>
              <span>共 9 页</span>
            </div>
          </section>

          <aside class="right-rail">
            <section class="panel">
              <h3>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v4M16 2v4M3 10h18"/><path d="M5 4h14a2 2 0 0 1 2 2v14H3V6a2 2 0 0 1 2-2Z"/></svg>
                今日抽背计划
              </h3>
              <div class="plan">
                <div class="ring"><div><b id="todayDone">12</b><span>/20</span></div></div>
                <div class="plan-stats">
                  <div>已完成 <strong id="planDone">12 张</strong></div>
                  <div>待复习 <strong style="color:var(--orange)" id="planTodo">6 张</strong></div>
                  <div>正确率 <strong>83%</strong></div>
                </div>
              </div>
              <button class="btn primary rail-btn" id="startPractice">开始抽背</button>
            </section>

            <section class="panel">
              <h3 style="justify-content:space-between">
                <span style="display:flex;align-items:center;gap:8px">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                  错题本（<span id="wrongCount">0</span>）
                </span>
                <button style="color:var(--teal);font-weight:900">全部</button>
              </h3>
              <div class="wrong-tabs">
                <button class="active">近期错题</button>
                <button>按章节</button>
                <button>按标签</button>
              </div>
              <div class="wrong-list" id="wrongList"></div>
              <button class="btn rail-btn">查看全部错题 →</button>
            </section>
          </aside>
        </div>
      </section>

      <footer class="footer">
        <span>坚持每天抽背，积少成多，顺利通过考试！</span>
        <span>📖 备考资料</span>
      </footer>
    </main>
  </div>

  <dialog id="chapterDialog">
    <form method="dialog" id="chapterForm">
      <div class="modal-head"><h3>添加章节</h3><button class="btn" value="cancel">关闭</button></div>
      <div class="modal-body">
        <div class="field"><label>章节名称</label><input id="chapterName" required placeholder="例如：大气环境影响评价"></div>
        <div class="field"><label>章节说明</label><input id="chapterDesc" placeholder="这章最容易混的点"></div>
      </div>
      <div class="modal-actions"><button class="btn primary" value="save">保存章节</button></div>
    </form>
  </dialog>

  <dialog id="cardDialog">
    <form method="dialog" id="cardForm">
      <div class="modal-head"><h3>添加卡片</h3><button class="btn" value="cancel">关闭</button></div>
      <div class="modal-body">
        <div class="field"><label>所属章节</label><select id="cardChapter"></select></div>
        <div class="field"><label>标题</label><input id="cardTitle" required placeholder="例如：地下水评价等级口诀"></div>
        <div class="field"><label>口诀</label><textarea id="cardMnemonic" required placeholder="例如：一类最重，敏感加重；四类最轻，通常不评。"></textarea></div>
        <div class="field"><label>含义</label><textarea id="cardMeaning" required placeholder="写清含义、适用条件和易混点"></textarea></div>
        <div class="field"><label>抽背题</label><input id="cardQuestion" required placeholder="例如：地下水评价等级由哪两个因素决定？"></div>
        <div class="field"><label>标签</label><input id="cardTags" placeholder="用逗号分隔，例如：地下水,评价等级"></div>
      </div>
      <div class="modal-actions"><button class="btn primary" value="save">保存卡片</button></div>
    </form>
  </dialog>

  <script>
    const storageKey = "eia-dashboard-memory-cards-v2";
    const seed = {
      activeChapterId: "ch4",
      view: "card",
      chapters: [
        { id: "ch1", title: "环境影响评价总论", count: 12, subs: [["1.1 评价目的与原则", 4], ["1.2 评价工作程序", 5], ["1.3 相关法律法规", 3]] },
        { id: "ch2", title: "大气环境影响评价", count: 18, subs: [] },
        { id: "ch3", title: "地表水环境影响评价", count: 22, subs: [] },
        { id: "ch4", title: "地下水环境影响评价", count: 16, subs: [] },
        { id: "ch5", title: "声环境影响评价", count: 10, subs: [] },
        { id: "ch6", title: "生态环境影响评价", count: 14, subs: [] },
        { id: "ch7", title: "土壤环境影响评价", count: 12, subs: [] },
        { id: "ch8", title: "环境风险评价", count: 15, subs: [] },
        { id: "ch9", title: "环境经济损益分析", count: 8, subs: [] },
        { id: "ch10", title: "环境管理与监测计划", count: 9, subs: [] }
      ],
      cards: [
        { id: "c1", chapterId: "ch2", title: "大气环境评价等级判定口诀", mnemonic: "十上一，一到十二，低一三。", meaning: "含义：Pmax ≥ 10% 为一级；1% ≤ Pmax < 10% 为二级；Pmax < 1% 为三级。", tags: ["大气环境", "评价等级", "Pmax"], date: "2024-05-10", status: "done", wrong: true, question: "大气环境评价等级判定主要依据什么指标？" },
        { id: "c2", chapterId: "ch3", title: "地表水评价等级口诀", mnemonic: "直排看两数，二万六十万为一；\n二百六千起为二；再小三级A；间排三级B。", meaning: "含义：直接排放的建设项目看废水排放量 Q 和污染物当量数 W。", tags: ["地表水", "评价等级", "Q与W"], date: "2024-05-08", status: "learning", wrong: true, question: "地表水污染影响型评价等级判定中，Q 和 W 的临界值是什么？" },
        { id: "c3", chapterId: "ch4", title: "地下水评价等级口诀", mnemonic: "一类最重，敏感加重；四类最轻，通常不评。", meaning: "含义：地下水评价等级由项目类别（I-IV类）和地下水敏感程度（敏感/较敏感/不敏感）共同决定。", tags: ["地下水", "评价等级", "敏感程度"], date: "2024-05-06", status: "done", wrong: true, question: "地下水环境影响评价工作等级如何确定？" },
        { id: "c4", chapterId: "ch5", title: "声环境评价要点口诀", mnemonic: "声看三区：功能区、增加量、影响人。", meaning: "含义：声环境评价主要考虑声环境功能区类别、噪声级增量、受影响人口变化情况。", tags: ["声环境", "评价要点"], date: "2024-05-05", status: "learning", wrong: false, question: "声环境评价主要看哪三个因素？" },
        { id: "c5", chapterId: "ch4", title: "地下水实验定位口诀", mnemonic: "抽注水层，渗测包气；浸溶固废，土柱迁移。", meaning: "含义：抽水/注水求含水层参数，渗水测包气带，浸溶看固废污染物溶出，土柱淋滤模拟污染迁移。", tags: ["地下水", "实验", "包气带"], date: "2024-05-11", status: "done", wrong: false, question: "试坑法、单环法、双环法属于什么试验？" }
      ]
    };

    let state = load();
    let mode = "cards";

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => Array.from(document.querySelectorAll(sel));

    function load() {
      try { return JSON.parse(localStorage.getItem(storageKey)) || structuredClone(seed); }
      catch { return structuredClone(seed); }
    }

    function save() { localStorage.setItem(storageKey, JSON.stringify(state)); }

    function esc(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function currentCards() {
      const q = $("#searchInput").value.trim().toLowerCase();
      const tag = $("#tagFilter").value;
      const status = $("#statusFilter").value;
      return state.cards.filter((card) => {
        const text = `${card.title} ${card.mnemonic} ${card.meaning} ${card.tags.join(" ")} ${card.question}`.toLowerCase();
        const tagOk = tag === "全部标签" || card.tags.includes(tag);
        const statusOk = status === "全部状态" || (status === "已掌握" && card.status === "done") || (status === "学习中" && card.status === "learning") || (status === "错题" && card.wrong);
        return (!q || text.includes(q)) && tagOk && statusOk;
      });
    }

    function render() {
      renderChapters();
      renderOverview();
      renderCards();
      renderWrong();
      fillSelect();
    }

    function renderChapters() {
      $("#chapterList").innerHTML = state.chapters.map((chapter, index) => `
        <div>
          <button class="chapter ${chapter.id === state.activeChapterId ? "active" : ""}" data-chapter="${chapter.id}">
            <span>${index + 1}.</span>
            <span>${esc(chapter.title)}</span>
            <span class="badge">${chapter.count}</span>
          </button>
          ${chapter.subs.length ? `<div class="subchapters">${chapter.subs.map(([name, count]) => `<div><span>${esc(name)}</span><span class="badge">${count}</span></div>`).join("")}</div>` : ""}
        </div>
      `).join("");
      $$("[data-chapter]").forEach((button) => button.addEventListener("click", () => {
        state.activeChapterId = button.dataset.chapter;
        save();
        render();
      }));
    }

    function renderOverview() {
      const total = state.cards.length;
      const done = state.cards.filter((card) => card.status === "done").length;
      const wrong = state.cards.filter((card) => card.wrong).length;
      const percent = total ? Math.round(done / total * 100) : 0;
      $("#totalCards").textContent = 136;
      $("#doneCards").textContent = 28;
      $("#wrongCards").textContent = 17;
      $("#progressBar").style.width = `${Math.max(20, percent)}%`;
      $("#progressText").textContent = `掌握进度：${percent}%`;
      $("#wrongCount").textContent = wrong || 17;
    }

    function renderCards() {
      const cards = currentCards();
      $("#cardGrid").classList.toggle("list", state.view === "list");
      if (!cards.length) {
        $("#cardGrid").innerHTML = `<div class="empty">没有找到卡片，换个筛选条件或添加一张新的。</div>`;
        return;
      }
      $("#cardGrid").innerHTML = cards.map((card, index) => `
        <article class="card">
          <div class="card-head">
            <h3>${esc(card.title)}</h3>
            <button class="star" title="收藏">${index === 0 ? "★" : "☆"}</button>
          </div>
          <div class="mnemonic">${esc(card.mnemonic)}</div>
          <div class="meaning">${esc(card.meaning)}</div>
          <div class="tags">${card.tags.map((tag) => `<span class="tag">${esc(tag)}</span>`).join("")}</div>
          <div class="card-foot">
            <span>📅 ${esc(card.date)}</span>
            <span class="status ${card.status === "done" ? "done" : "learning"}">${card.status === "done" ? "● 已掌握" : "● 学习中"}</span>
            <button data-wrong="${card.id}" title="标为错题">⋯</button>
          </div>
        </article>
      `).join("");
      $$("[data-wrong]").forEach((button) => button.addEventListener("click", () => {
        const card = state.cards.find((item) => item.id === button.dataset.wrong);
        card.wrong = !card.wrong;
        save();
        render();
      }));
    }

    function renderWrong() {
      const wrong = state.cards.filter((card) => card.wrong).slice(0, 3);
      $("#wrongList").innerHTML = wrong.length ? wrong.map((card) => `
        <div class="wrong-item">
          <div>${esc(card.question)}<time>${esc(card.date)}</time></div>
          <span class="wrong-label">错题</span>
        </div>
      `).join("") : `<div class="empty" style="padding:18px">暂无错题</div>`;
    }

    function fillSelect() {
      $("#cardChapter").innerHTML = state.chapters.map((chapter) => `<option value="${chapter.id}" ${chapter.id === state.activeChapterId ? "selected" : ""}>${esc(chapter.title)}</option>`).join("");
    }

    function openPractice() {
      $("#statusFilter").value = "全部状态";
      $("#tagFilter").value = "全部标签";
      $(".tab.active").classList.remove("active");
      $('[data-mode="practice"]').classList.add("active");
      mode = "practice";
      const cards = currentCards();
      if (cards.length) alert(`抽背题：${cards[Math.floor(Math.random() * cards.length)].question}`);
    }

    $("#searchInput").addEventListener("input", renderCards);
    $("#tagFilter").addEventListener("change", renderCards);
    $("#statusFilter").addEventListener("change", renderCards);
    $("#cardViewBtn").addEventListener("click", () => { state.view = "card"; save(); $("#cardViewBtn").classList.add("active"); $("#listViewBtn").classList.remove("active"); renderCards(); });
    $("#listViewBtn").addEventListener("click", () => { state.view = "list"; save(); $("#listViewBtn").classList.add("active"); $("#cardViewBtn").classList.remove("active"); renderCards(); });
    $("#addChapterBtn").addEventListener("click", () => $("#chapterDialog").showModal());
    $("#topAddChapter").addEventListener("click", () => $("#chapterDialog").showModal());
    $("#addCardBtn").addEventListener("click", () => $("#cardDialog").showModal());
    $("#practiceBtn").addEventListener("click", openPractice);
    $("#startPractice").addEventListener("click", openPractice);
    $$(".tab").forEach((tab) => tab.addEventListener("click", () => {
      $$(".tab").forEach((item) => item.classList.remove("active"));
      tab.classList.add("active");
      mode = tab.dataset.mode;
      if (mode === "wrong") $("#statusFilter").value = "错题";
      if (mode === "cards") $("#statusFilter").value = "全部状态";
      renderCards();
    }));

    $("#chapterForm").addEventListener("submit", (event) => {
      if (event.submitter.value !== "save") return;
      event.preventDefault();
      const chapter = { id: `ch${Date.now()}`, title: $("#chapterName").value.trim(), count: 0, subs: [] };
      state.chapters.push(chapter);
      state.activeChapterId = chapter.id;
      save();
      event.target.reset();
      $("#chapterDialog").close();
      render();
    });

    $("#cardForm").addEventListener("submit", (event) => {
      if (event.submitter.value !== "save") return;
      event.preventDefault();
      state.cards.push({
        id: `c${Date.now()}`,
        chapterId: $("#cardChapter").value,
        title: $("#cardTitle").value.trim(),
        mnemonic: $("#cardMnemonic").value.trim(),
        meaning: $("#cardMeaning").value.trim(),
        question: $("#cardQuestion").value.trim(),
        tags: $("#cardTags").value.split(/[，,]/).map((tag) => tag.trim()).filter(Boolean),
        date: new Date().toISOString().slice(0, 10),
        status: "learning",
        wrong: false
      });
      save();
      event.target.reset();
      $("#cardDialog").close();
      render();
    });

    document.addEventListener("keydown", (event) => {
      if (event.ctrlKey && event.key.toLowerCase() === "k") {
        event.preventDefault();
        $("#searchInput").focus();
      }
    });

    render();
  </script>
</body>
</html>
