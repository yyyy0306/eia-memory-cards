<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>环评记忆卡</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #dde5ec;
      --line-strong: #c8d5df;
      --teal: #008a82;
      --teal-dark: #05736d;
      --teal-soft: #e7f7f5;
      --blue-soft: #e7f1ff;
      --blue: #2a6fb6;
      --orange: #f59e0b;
      --red: #ef4e45;
      --red-soft: #fff0ee;
      --green: #10a37f;
      --shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; border: 0; background: none; color: inherit; }

    .app {
      display: grid;
      grid-template-columns: 324px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: auto;
      padding: 20px 16px 24px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 54px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #006d79, #16b69e);
      color: white;
      box-shadow: 0 12px 22px rgba(0, 138, 130, 0.22);
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .side-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #344054;
      font-size: 15px;
      font-weight: 800;
    }

    .manage {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #475467;
      font-weight: 700;
      font-size: 13px;
    }

    .chapters {
      display: grid;
      gap: 7px;
    }

    .chapter {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 43px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      text-align: left;
      font-weight: 700;
    }

    .chapter.active {
      border-color: #61bdb5;
      background: var(--teal-soft);
      color: var(--teal-dark);
    }

    .chapter span:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #edf2f7;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }

    .chapter.active .badge {
      background: var(--teal);
      color: white;
    }

    .subchapters {
      margin: -2px 0 8px 30px;
      padding-left: 18px;
      border-left: 1px solid var(--line);
      color: #475467;
      font-size: 13px;
    }

    .subchapters div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
    }

    .overview {
      margin-top: auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .overview h3 {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #344054;
      font-size: 15px;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
    }

    .overview-grid b {
      display: block;
      margin-top: 4px;
      font-size: 20px;
    }

    .overview-grid span {
      color: var(--muted);
      font-size: 12px;
    }

    .progress {
      height: 8px;
      margin: 16px 0 10px;
      border-radius: 999px;
      background: #e9eef2;
      overflow: hidden;
    }

    .progress i {
      display: block;
      height: 100%;
      width: 24%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), #19b394);
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto auto auto minmax(220px, 340px) 1fr auto;
      align-items: center;
      gap: 16px;
      min-height: 88px;
      padding: 18px 26px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 9px 16px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel);
      color: #1d2939;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn:hover { border-color: #99aebd; box-shadow: 0 8px 20px rgba(16, 24, 40, 0.08); }
    .btn.primary { border-color: var(--teal); background: linear-gradient(135deg, #009c92, #007c76); color: white; }
    .btn.danger { border-color: #ffc0bd; background: var(--red-soft); color: #bf2f29; }
    .btn.ghost { min-width: 42px; padding: 9px; border-color: transparent; background: transparent; }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      min-height: 42px;
      padding: 10px 56px 10px 40px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
      background: white;
    }

    .search svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .kbd {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      padding: 3px 8px;
      border-radius: 7px;
      background: #f2f4f7;
      color: #475467;
      font-size: 12px;
      font-weight: 800;
    }

    .user {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--teal);
      color: white;
      font-weight: 900;
    }

    .content {
      padding: 22px 26px 0;
    }

    .tabs {
      display: flex;
      gap: 38px;
      min-height: 44px;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-bottom: 3px solid transparent;
      color: #475467;
      font-weight: 900;
    }

    .tab.active {
      color: var(--teal);
      border-color: var(--teal);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 292px;
      gap: 28px;
      padding-top: 26px;
      align-items: start;
    }

    .filters {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .selects, .view-toggle {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    select {
      min-height: 40px;
      padding: 8px 38px 8px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: #344054;
      font-weight: 700;
      outline: none;
    }

    .seg {
      display: inline-flex;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
    }

    .seg button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 6px;
      color: #475467;
      font-size: 13px;
      font-weight: 800;
    }

    .seg button.active {
      background: var(--teal-soft);
      color: var(--teal-dark);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 16px;
    }

    .cards.list { grid-template-columns: 1fr; }

    .card {
      display: grid;
      gap: 18px;
      min-height: 310px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 6px 18px rgba(16, 24, 40, 0.04);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .star {
      color: var(--orange);
      font-size: 24px;
      line-height: 1;
    }

    .mnemonic {
      color: var(--teal-dark);
      font-size: 19px;
      line-height: 1.55;
      font-weight: 900;
      white-space: pre-wrap;
    }

    .meaning {
      color: #475467;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
    }

    .status.done { color: var(--green); }
    .status.learning { color: var(--orange); }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0 0;
      color: #475467;
    }

    .page-buttons {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .page {
      min-width: 38px;
      height: 38px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-weight: 800;
    }

    .page.active {
      border-color: #97d7d1;
      background: var(--teal-soft);
      color: var(--teal-dark);
    }

    .right-rail {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: var(--shadow);
    }

    .panel h3 {
      margin: 0 0 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #344054;
      font-size: 15px;
    }

    .plan {
      display: grid;
      grid-template-columns: 100px 1fr;
      align-items: center;
      gap: 14px;
    }

    .ring {
      width: 98px;
      height: 98px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--teal) 0 68%, #e8eef2 68% 100%);
      position: relative;
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: white;
    }

    .ring b {
      position: relative;
      z-index: 1;
      font-size: 26px;
    }

    .ring span {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .plan-stats {
      display: grid;
      gap: 8px;
      color: #475467;
      font-size: 13px;
    }

    .plan-stats strong {
      float: right;
      color: var(--teal);
      font-size: 16px;
    }

    .rail-btn {
      width: 100%;
      margin-top: 18px;
    }

    .wrong-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .wrong-tabs button {
      min-height: 36px;
      color: #667085;
      font-size: 13px;
      font-weight: 800;
      border-bottom: 2px solid transparent;
    }

    .wrong-tabs button.active {
      color: var(--teal);
      border-color: var(--teal);
    }

    .wrong-list {
      display: grid;
      gap: 12px;
    }

    .wrong-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      color: #344054;
      font-size: 13px;
      line-height: 1.55;
    }

    .wrong-item:last-child { border-bottom: 0; padding-bottom: 0; }

    .wrong-item time {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .wrong-label {
      align-self: start;
      padding: 4px 8px;
      border-radius: 999px;
      background: #fff1f3;
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 66px;
      margin-top: auto;
      border-top: 1px solid var(--line);
      color: #667085;
      background: rgba(255,255,255,0.8);
    }

    .empty {
      padding: 32px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: white;
      text-align: center;
      color: var(--muted);
    }

    .practice-card {
      display: grid;
      gap: 18px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      box-shadow: var(--shadow);
    }

    .practice-question {
      min-height: 128px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fbfd;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.55;
    }

    .practice-answer {
      display: none;
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid #bfe3df;
      background: var(--teal-soft);
      color: #075f59;
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .practice-answer.show { display: block; }

    .practice-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .wrong-page {
      display: grid;
      gap: 12px;
    }

    .wrong-card {
      display: grid;
      gap: 10px;
      padding: 18px;
      border: 1px solid #ffd0cc;
      border-radius: var(--radius);
      background: #fffafa;
    }

    .wrong-card h3 { margin: 0; font-size: 18px; }

    dialog {
      width: min(640px, calc(100vw - 28px));
      border: 0;
      border-radius: var(--radius);
      padding: 0;
      box-shadow: 0 26px 70px rgba(16, 24, 40, 0.25);
    }

    dialog::backdrop { background: rgba(16, 24, 40, 0.45); }

    .modal-head, .modal-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .modal-actions { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
    .modal-head h3 { margin: 0; }

    .modal-body {
      display: grid;
      gap: 13px;
      padding: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-size: 13px;
      font-weight: 900;
      color: #344054;
    }

    .field input, .field textarea, .field select {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
    }

    .field textarea { min-height: 92px; resize: vertical; }
    .hidden { display: none !important; }
    .icon { width: 18px; height: 18px; flex: 0 0 auto; }

    @media (max-width: 1180px) {
      .workspace { grid-template-columns: 1fr; }
      .right-rail { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .topbar { grid-template-columns: repeat(3, auto) minmax(220px, 1fr) auto; }
      .user { display: none; }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .overview { margin-top: 0; }
      .topbar { grid-template-columns: 1fr 1fr; }
      .topbar .search { grid-column: 1 / -1; }
      .content { padding: 18px; }
      .cards { grid-template-columns: 1fr; }
      .right-rail { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .topbar { grid-template-columns: 1fr; padding: 14px; }
      .btn { width: 100%; }
      .tabs { gap: 18px; overflow-x: auto; }
      .filters { align-items: stretch; flex-direction: column; }
      .selects, .view-toggle { width: 100%; }
      select, .seg { flex: 1; }
      .card { min-height: 0; }
      .plan { grid-template-columns: 1fr; justify-items: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M19 4c-7 1-11 5-12 12"/><path d="M5 20c8-1 13-6 14-16"/><path d="M8 15c-2.5 0-4.2-.9-5-2.8C5.7 7 10.8 4.5 18.5 4"/></svg>
        </div>
        <div>
          <h1>环评记忆卡</h1>
          <p>环评考试记忆卡片 · 高效备考</p>
        </div>
      </div>

      <div class="side-heading">
        <span>章节列表</span>
        <button class="manage" id="addChapterBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          管理
        </button>
      </div>
      <div class="chapters" id="chapterList"></div>

      <div class="overview">
        <h3>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5"/><path d="M4 19h16"/><path d="m7 15 3-3 3 2 5-7"/></svg>
          学习概览
        </h3>
        <div class="overview-grid">
          <div><span>卡片总数</span><b id="totalCards">0</b></div>
          <div><span>已掌握</span><b style="color:var(--green)" id="doneCards">0</b></div>
          <div><span>错题数</span><b style="color:var(--red)" id="wrongCards">0</b></div>
        </div>
        <div class="progress"><i id="progressBar"></i></div>
        <div style="display:flex;justify-content:space-between;color:var(--muted);font-size:13px">
          <span id="progressText">掌握进度：0%</span>
          <button style="color:var(--teal);font-weight:800">查看统计 →</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="btn primary" id="topAddChapter">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          添加章节
        </button>
        <button class="btn" id="addCardBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          添加卡片
        </button>
        <button class="btn" id="practiceBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7h8"/><path d="M8 12h5"/><path d="M7 21h10a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z"/></svg>
          抽背练习
        </button>
        <div class="search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" placeholder="搜索卡片内容">
          <span class="kbd">Ctrl K</span>
        </div>
        <span></span>
        <div class="user">
          <button class="btn ghost" title="主题">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
          <button class="btn ghost" title="通知">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </button>
          <div class="avatar">学</div>
        </div>
      </header>

      <section class="content">

        { id: "c5", chapterId: "ch4", title: "地下水实验定位口诀", mnemonic: "抽注水层，渗测包气；浸溶固废，土柱迁移。", meaning: "含义：抽水/注水求含水层参数，渗水测包气带，浸溶看固废污染物溶出，土柱淋滤模拟污染迁移。", tags: ["地下水", "实验", "包气带"], date: "2024-05-11", status: "done", wrong: false, question: "试坑法、单环法、双环法属于什么试验？" },
        { id: "c6", chapterId: "ch1", title: "建设项目环评分类管理", mnemonic: "影响重，报告书；影响轻，报告表；很小登记表。", meaning: "重难点：不是按投资额分类，而是按环境影响程度分类。案例题常问“应编制哪类文件、谁审批、是否可豁免”。", tags: ["法规程序", "分类管理", "高频"], date: "2026-05-12", status: "done", wrong: false, question: "建设项目环评文件分类管理的核心依据是什么？" },

        { id: "c8", chapterId: "ch1", title: "公众参与高频边界", mnemonic: "报告书多公众，表和登记通常少；敏感项目别漏信息公开。", meaning: "高频问法：公众参与主体、公开内容、公开时点、意见采纳说明。案例题不要只写“已公示”，要写是否充分、是否回应意见。", tags: ["公众参与", "法规程序", "案例分析"], date: "2026-05-12", status: "learning", wrong: true, question: "公众参与在案例分析中通常从哪些角度审查？" },

        { id: "c10", chapterId: "ch2", title: "大气现状调查与监测", mnemonic: "先看达标区，再查污染源；常规因子有数据，特征因子补监测。", meaning: "重难点：环境空气质量达标区判定、区域污染源调查、评价因子筛选、现状监测布点。别把现状调查写成只测厂界。", tags: ["大气环境", "现状调查", "高频"], date: "2026-05-12", status: "learning", wrong: false, question: "大气现状调查为什么要先判断区域达标情况？" },
        { id: "c11", chapterId: "ch2", title: "大气预测评价高频", mnemonic: "正常排放看长期，非正常排放看短时；新增污染要叠加背景。", meaning: "高频问法：预测因子、预测情景、背景浓度叠加、达标判定、区域削减方案。案例题常问预测情景是否完整。", tags: ["大气环境", "预测评价", "案例分析"], date: "2026-05-12", status: "learning", wrong: true, question: "大气预测评价中为什么要考虑非正常排放情景？" },
        { id: "c12", chapterId: "ch3", title: "地表水直接/间接排放", mnemonic: "直排入水体，等级看QW；间排进管网，重点看接纳可行。", meaning: "易混点：间接排放不是不用评价，而是重点转向污水处理厂接纳能力、管网条件、排放标准衔接和事故风险。", tags: ["地表水", "评价等级", "高频"], date: "2026-05-12", status: "done", wrong: false, question: "地表水间接排放项目评价重点是什么？" },
        { id: "c13", chapterId: "ch3", title: "地表水断面布设", mnemonic: "上游控背景，下游看影响；排口混合区，敏感点加密。", meaning: "重难点：监测断面要服务影响识别，通常考虑对照断面、控制断面、削减断面和敏感目标断面。", tags: ["地表水", "现状调查", "监测"], date: "2026-05-12", status: "learning", wrong: false, question: "地表水现状监测断面布设要覆盖哪些位置？" },
        { id: "c14", chapterId: "ch4", title: "地下水污染防控", mnemonic: "源头减量，分区防渗；跟踪监测，应急处置。", meaning: "案例高频：防渗分区是否合理、重点污染防治区是否加强、监测井布设是否覆盖上游/厂区/下游、事故泄漏是否有收集和应急。", tags: ["地下水", "措施", "案例分析"], date: "2026-05-12", status: "done", wrong: true, question: "地下水污染防治措施通常包括哪几类？" },
        { id: "c15", chapterId: "ch6", title: "生态影响识别", mnemonic: "占地、阻隔、破碎化；物种、生境、生态流。", meaning: "重难点：生态评价不只看污染物，还看工程占地、施工扰动、栖息地破碎化、迁徙通道阻隔、水文过程改变和生态恢复。", tags: ["生态", "现状调查", "高频"], date: "2026-05-12", status: "learning", wrong: false, question: "生态影响评价为什么不能只写污染物排放？" },
        { id: "c16", chapterId: "ch6", title: "生态保护措施顺序", mnemonic: "先避让，后减缓；再修复，最后补偿。", meaning: "案例答题模板：优先优化选址选线避让敏感区；无法避让时采取减缓措施；施工后生态恢复；仍有不可避免影响时生态补偿。", tags: ["生态", "措施", "案例分析"], date: "2026-05-12", status: "done", wrong: false, question: "生态保护措施的一般优先顺序是什么？" },
        { id: "c17", chapterId: "ch7", title: "土壤评价高频", mnemonic: "污染影响看入土，生态影响看盐酸碱；源径汇别混。", meaning: "易混点：污染影响型关注污染物通过大气沉降、地面漫流、垂直入渗进入土壤；生态影响型关注盐化、酸化、碱化等。", tags: ["土壤", "评价等级", "高频"], date: "2026-05-12", status: "learning", wrong: false, question: "土壤污染影响型评价常见影响途径有哪些？" },
        { id: "c18", chapterId: "ch8", title: "环境风险三件套", mnemonic: "识别风险源，预测事故后果，落实防范应急。", meaning: "重难点：风险评价不是正常排放评价，重点是危险物质、事故情景、最大可信事故、影响范围、防范措施和应急预案。", tags: ["环境风险", "案例分析", "高频"], date: "2026-05-12", status: "done", wrong: true, question: "环境风险评价和常规环境影响评价的侧重点有什么不同？" },
        { id: "c19", chapterId: "ch8", title: "事故废水不外排", mnemonic: "能收集，能切换，能暂存，能处理。", meaning: "案例高频：围堰、事故池、雨污切换、初期雨水收集、消防废水收集、关闭阀门、事故后处理去向。", tags: ["环境风险", "措施", "高频"], date: "2026-05-12", status: "learning", wrong: true, question: "事故废水防控措施如何答得完整？" },
        { id: "c20", chapterId: "ch9", title: "案例工程分析模板", mnemonic: "原辅料、工艺线；产排污、平衡图；节点因子别漏掉。", meaning: "案例分析最常见扣分点：只写污染物，不写产污环节；只写末端治理，不写源强核算；忽略物料平衡、水量平衡、特征污染因子。", tags: ["案例分析", "工程分析", "高频"], date: "2026-05-12", status: "done", wrong: false, question: "案例题中的工程分析应重点交代哪些内容？" },

        { id: "c22", chapterId: "ch9", title: "选址合理性模板", mnemonic: "规划相符，红线不碰；敏感避让，环境可承载。", meaning: "案例高频：产业政策、规划环评及审查意见、三线一单、生态保护红线、环境质量底线、资源利用上线、敏感目标距离和环境风险可接受。", tags: ["案例分析", "法规程序", "高频"], date: "2026-05-12", status: "done", wrong: true, question: "项目选址合理性通常从哪些方面论证？" },
        { id: "c23", chapterId: "ch10", title: "环境监测计划", mnemonic: "点位、因子、频次、标准；责任、记录、公开。", meaning: "重难点：监测计划不是一句“定期监测”，要写清污染源监测、环境质量监测、地下水/土壤跟踪监测、事故监测和信息公开。", tags: ["监测", "环境管理", "案例分析"], date: "2026-05-12", status: "learning", wrong: false, question: "一个完整的环境监测计划应包含哪些要素？" },

        { id: "c26", chapterId: "ch11", title: "案例万能检查清单", mnemonic: "合法合规、源强清楚；现状可信、预测完整；措施可行、结论闭合。", meaning: "答案例时每道题都扫一遍：产业政策/规划/三线一单，工程分析与源强，环境质量现状，预测评价，污染防治与风险防范，监测管理和公众参与。", tags: ["案例分析", "高频", "考前速记"], date: "2026-05-12", status: "done", wrong: false, question: "案例分析答题如何避免漏项？" },
        { id: "c27", chapterId: "ch11", title: "措施题高频答法", mnemonic: "废气收集处理，废水分质回用；固废分类去向，噪声隔声减振；地下防渗监测，风险围堵应急。", meaning: "措施题要分要素作答，且每项都要落到工程措施、管理措施、达标目标和监测验证。", tags: ["措施", "案例分析", "高频"], date: "2026-05-12", status: "learning", wrong: false, question: "污染防治措施题为什么要按环境要素分条回答？" },
        { id: "c28", chapterId: "ch11", title: "审题关键词", mnemonic: "问合理性就论证；问可行性就证据；问完善措施就补缺口。", meaning: "很多失分来自答非所问：合理性题强调相符性和可接受性；可行性题强调技术/达标/运行；完善措施题先找原方案缺什么。", tags: ["案例分析", "考前速记", "高频"], date: "2026-05-12", status: "learning", wrong: true, question: "案例题中“合理性、可行性、完善措施”三类问法有什么区别？" }
      ]
    };

    let state = load();
    let mode = "cards";
    let currentQuizId = null;

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => Array.from(document.querySelectorAll(sel));

    function load() {
      try { return JSON.parse(localStorage.getItem(storageKey)) || structuredClone(seed); }
      catch { return structuredClone(seed); }
    }

    function save() { localStorage.setItem(storageKey, JSON.stringify(state)); }

    function esc(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function currentCards() {
      const q = $("#searchInput").value.trim().toLowerCase();
      const tag = $("#tagFilter").value;
      const status = $("#statusFilter").value;
      return state.cards.filter((card) => {
        const text = `${card.title} ${card.mnemonic} ${card.meaning} ${card.tags.join(" ")} ${card.question}`.toLowerCase();
        const chapterOk = card.chapterId === state.activeChapterId;
        const tagOk = tag === "全部标签" || card.tags.includes(tag);
        const statusOk = status === "全部状态" || (status === "已掌握" && card.status === "done") || (status === "学习中" && card.status === "learning") || (status === "错题" && card.wrong);
        return chapterOk && (!q || text.includes(q)) && tagOk && statusOk;
      });
    }

    function render() {
      renderChapters();
      renderOverview();
      renderCards();
      renderWrong();
      fillSelect();
    }

    function renderChapters() {
      $("#chapterList").innerHTML = state.chapters.map((chapter, index) => `
        <div>
          <button class="chapter ${chapter.id === state.activeChapterId ? "active" : ""}" data-chapter="${chapter.id}">
            <span>${index + 1}.</span>
            <span>${esc(chapter.title)}</span>
            <span class="badge">${chapter.count}</span>
          </button>
          ${chapter.subs.length ? `<div class="subchapters">${chapter.subs.map(([name, count]) => `<div><span>${esc(name)}</span><span class="badge">${count}</span></div>`).join("")}</div>` : ""}
        </div>
      `).join("");
      $$("[data-chapter]").forEach((button) => button.addEventListener("click", () => {
        state.activeChapterId = button.dataset.chapter;
        save();
        render();
      }));
    }

    function renderOverview() {
      const total = state.cards.length;
      const done = state.cards.filter((card) => card.status === "done").length;
      const wrong = state.cards.filter((card) => card.wrong).length;
      const percent = total ? Math.round(done / total * 100) : 0;
      $("#totalCards").textContent = 136;
      $("#doneCards").textContent = 28;
      $("#wrongCards").textContent = 17;
      $("#progressBar").style.width = `${Math.max(20, percent)}%`;
      $("#progressText").textContent = `掌握进度：${percent}%`;
      $("#wrongCount").textContent = wrong || 17;
    }

    function renderCards() {
      if (mode === "practice") {
        renderPractice();
        return;
      }
      if (mode === "wrong") {
        renderWrongPage();
        return;
      }
      const cards = currentCards();
      $("#cardGrid").classList.toggle("list", state.view === "list");
      if (!cards.length) {
        $("#cardGrid").innerHTML = `<div class="empty">没有找到卡片，换个筛选条件或添加一张新的。</div>`;
        return;
      }
      $("#cardGrid").innerHTML = cards.map((card, index) => `
        <article class="card">
          <div class="card-head">
            <h3>${esc(card.title)}</h3>
            <button class="star" title="收藏">${index === 0 ? "★" : "☆"}</button>
          </div>
          <div class="mnemonic">${esc(card.mnemonic)}</div>
          <div class="meaning">${esc(card.meaning)}</div>
          <div class="tags">${card.tags.map((tag) => `<span class="tag">${esc(tag)}</span>`).join("")}</div>
          <div class="card-foot">
            <span>📅 ${esc(card.date)}</span>
            <span class="status ${card.status === "done" ? "done" : "learning"}">${card.status === "done" ? "● 已掌握" : "● 学习中"}</span>
            <button class="btn ${card.wrong ? "" : "danger"}" data-wrong="${card.id}" title="标为错题">${card.wrong ? "移出错题" : "标为错题"}</button>
          </div>
        </article>
      `).join("");
      $$("[data-wrong]").forEach((button) => button.addEventListener("click", () => {
        const card = state.cards.find((item) => item.id === button.dataset.wrong);
        card.wrong = !card.wrong;
        save();
        render();
      }));
    }

    function renderPractice() {
      const cards = currentCards();
      $("#cardGrid").classList.remove("list");
      if (!cards.length) {
        $("#cardGrid").innerHTML = `<div class="empty">当前章节没有可抽背卡片。换个章节，或先添加一张卡片。</div>`;
        return;
      }
      const card = cards.find((item) => item.id === currentQuizId) || cards[0];
      currentQuizId = card.id;
      $("#cardGrid").innerHTML = `
        <section class="practice-card">
          <div>
            <span class="tag">${esc(state.chapters.find((chapter) => chapter.id === card.chapterId)?.title || "当前章节")}</span>
            <h2 style="margin:12px 0 0">${esc(card.title)}</h2>
          </div>
          <div class="practice-question">${esc(card.question)}</div>
          <div class="practice-answer" id="practiceAnswer">${esc(card.mnemonic)}\n\n${esc(card.meaning)}</div>
          <div class="practice-actions">
            <button class="btn primary" id="showAnswerBtn">显示答案</button>
            <button class="btn" id="knowBtn">答对了</button>
            <button class="btn danger" id="missBtn">答错，加入错题</button>
            <button class="btn" id="nextBtn">下一题</button>
          </div>
        </section>
      `;
      $("#showAnswerBtn").addEventListener("click", () => $("#practiceAnswer").classList.add("show"));
      $("#knowBtn").addEventListener("click", () => {
        card.status = "done";
        card.wrong = false;
        save();
        nextQuiz(cards);
      });
      $("#missBtn").addEventListener("click", () => {
        card.status = "learning";
        card.wrong = true;
        save();
        nextQuiz(cards);
      });
      $("#nextBtn").addEventListener("click", () => nextQuiz(cards));
    }

    function nextQuiz(cards) {
      const pool = cards.filter((card) => card.id !== currentQuizId);
      const nextPool = pool.length ? pool : cards;
      currentQuizId = nextPool[Math.floor(Math.random() * nextPool.length)].id;
      render();
    }

    function renderWrongPage() {
      const wrongCards = currentCards().filter((card) => card.wrong);
      $("#cardGrid").classList.add("list");
      if (!wrongCards.length) {
        $("#cardGrid").innerHTML = `<div class="empty">当前章节没有错题。点卡片上的“标为错题”，或在抽背里点“答错”。</div>`;
        return;
      }
      $("#cardGrid").innerHTML = `<section class="wrong-page">${wrongCards.map((card) => `
        <article class="wrong-card">
          <h3>${esc(card.title)}</h3>
          <div class="practice-question" style="min-height:auto;font-size:17px">${esc(card.question)}</div>
          <div class="mnemonic">${esc(card.mnemonic)}</div>
          <div class="meaning">${esc(card.meaning)}</div>
          <div class="practice-actions">
            <button class="btn primary" data-practice="${card.id}">马上抽背</button>
            <button class="btn" data-clear-wrong="${card.id}">移出错题</button>
          </div>
        </article>
      `).join("")}</section>`;
      $$("[data-practice]").forEach((button) => button.addEventListener("click", () => {
        currentQuizId = button.dataset.practice;
        setMode("practice");
      }));
      $$("[data-clear-wrong]").forEach((button) => button.addEventListener("click", () => {
        const card = state.cards.find((item) => item.id === button.dataset.clearWrong);
        card.wrong = false;
        save();
        render();
      }));
    }

    function renderWrong() {
      const wrong = state.cards.filter((card) => card.wrong).slice(0, 3);
      $("#wrongList").innerHTML = wrong.length ? wrong.map((card) => `
        <div class="wrong-item">
          <div>${esc(card.question)}<time>${esc(card.date)}</time></div>
          <span class="wrong-label">错题</span>
        </div>
      `).join("") : `<div class="empty" style="padding:18px">暂无错题</div>`;
    }

    function fillSelect() {
      $("#cardChapter").innerHTML = state.chapters.map((chapter) => `<option value="${chapter.id}" ${chapter.id === state.activeChapterId ? "selected" : ""}>${esc(chapter.title)}</option>`).join("");
    }

    function openPractice() {
      $("#statusFilter").value = "全部状态";
      $("#tagFilter").value = "全部标签";
      setMode("practice");
    }

    function setMode(nextMode) {
      mode = nextMode;
      $$(".tab").forEach((item) => item.classList.toggle("active", item.dataset.mode === nextMode));
      if (mode === "wrong") $("#statusFilter").value = "错题";
      if (mode === "cards") $("#statusFilter").value = "全部状态";
      render();
    }

    $("#searchInput").addEventListener("input", renderCards);
    $("#tagFilter").addEventListener("change", renderCards);
    $("#statusFilter").addEventListener("change", renderCards);
    $("#cardViewBtn").addEventListener("click", () => { state.view = "card"; save(); $("#cardViewBtn").classList.add("active"); $("#listViewBtn").classList.remove("active"); renderCards(); });
    $("#listViewBtn").addEventListener("click", () => { state.view = "list"; save(); $("#listViewBtn").classList.add("active"); $("#cardViewBtn").classList.remove("active"); renderCards(); });
    $("#addChapterBtn").addEventListener("click", () => $("#chapterDialog").showModal());
    $("#topAddChapter").addEventListener("click", () => $("#chapterDialog").showModal());
    $("#addCardBtn").addEventListener("click", () => $("#cardDialog").showModal());
    $("#practiceBtn").addEventListener("click", openPractice);
    $("#startPractice").addEventListener("click", openPractice);
    $$(".tab").forEach((tab) => tab.addEventListener("click", () => setMode(tab.dataset.mode)));

    $("#chapterForm").addEventListener("submit", (event) => {
      if (event.submitter.value !== "save") return;
      event.preventDefault();
      const chapter = { id: `ch${Date.now()}`, title: $("#chapterName").value.trim(), count: 0, subs: [] };
      state.chapters.push(chapter);
      state.activeChapterId = chapter.id;
      save();
      event.target.reset();
      $("#chapterDialog").close();
      render();
    });

    $("#cardForm").addEventListener("submit", (event) => {
      if (event.submitter.value !== "save") return;
      event.preventDefault();
      state.cards.push({
        id: `c${Date.now()}`,
        chapterId: $("#cardChapter").value,
        title: $("#cardTitle").value.trim(),
        mnemonic: $("#cardMnemonic").value.trim(),
        meaning: $("#cardMeaning").value.trim(),
        question: $("#cardQuestion").value.trim(),
        tags: $("#cardTags").value.split(/[，,]/).map((tag) => tag.trim()).filter(Boolean),
        date: new Date().toISOString().slice(0, 10),
        status: "learning",
        wrong: false
      });
      save();
      event.target.reset();
      $("#cardDialog").close();
      render();
    });

    document.addEventListener("keydown", (event) => {
      if (event.ctrlKey && event.key.toLowerCase() === "k") {
        event.preventDefault();
        $("#searchInput").focus();
      }
    });

    render();
  </script>
</body>
</html>
